name: Ingesta de correos Bancolombia

on:
  schedule:
    # Cada 15 minutos (hora UTC). GitHub puede retrasarlo en horas pico.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: ingesta
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Ejecutar ingestor
        run: npm run ingest
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CUENTAS_USER_ID: ${{ secrets.CUENTAS_USER_ID }}
